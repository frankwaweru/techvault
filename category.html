<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechVault — Category</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<style>
:root{
  --deep:#080A0E; --dark:#0D1117; --surface:#161B22; --card:#1C2128;
  --line:#21262D; --white:#F0F6FC; --muted:#8B949E; --dim:#484F58;
  --blue:#1C7EF5; --blue-light:#58A6FF; --blue-glow:rgba(28,126,245,.08);
  --gold:#F0B429; --danger:#FF4D6A; --green:#3FB950;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--deep);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;
  padding:0 40px;height:60px;gap:20px;
  background:rgba(8,10,14,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;
  text-decoration:none;color:var(--white);flex-shrink:0;}
.logo span{color:var(--blue);}
.nav-back{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;
  color:var(--muted);text-decoration:none;transition:color .2s;flex-shrink:0;}
.nav-back:hover{color:var(--white);}
.nav-back svg{flex-shrink:0;}
.nav-sep{width:1px;height:20px;background:var(--line);}
.nav-title{font-size:14px;font-weight:600;color:var(--white);}
.nav-spacer{flex:1;}
.nav-search{display:flex;align-items:center;background:var(--surface);
  border:1px solid var(--line);border-radius:10px;padding:0 14px;gap:8px;
  height:36px;width:260px;transition:border-color .2s;}
.nav-search:focus-within{border-color:var(--blue);}
.nav-search input{background:none;border:none;outline:none;color:var(--white);
  font-family:'DM Sans',sans-serif;font-size:13px;width:100%;}
.nav-search input::placeholder{color:var(--dim);}
.home-btn{display:flex;align-items:center;gap:6px;padding:0 14px;height:34px;
  background:var(--surface);border:1px solid var(--line);border-radius:8px;
  font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;
  transition:all .2s;flex-shrink:0;}
.home-btn:hover{border-color:var(--blue);color:var(--white);}

/* ── PAGE HEADER ── */
.page-header{padding:40px 40px 0;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--dim);margin-bottom:16px;}
.breadcrumb a{color:var(--dim);text-decoration:none;transition:color .2s;}
.breadcrumb a:hover{color:var(--muted);}
.breadcrumb span{color:var(--muted);}
.page-title-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:2px;color:var(--white);}
.page-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--blue-light);
  background:var(--blue-glow);border:1px solid rgba(28,126,245,.3);
  padding:4px 12px;border-radius:20px;}
.page-sub{font-size:14px;color:var(--muted);margin-top:6px;}

/* ── FILTER BAR ── */
.filter-bar{padding:20px 40px;display:flex;align-items:center;gap:10px;
  flex-wrap:wrap;border-bottom:1px solid var(--line);
  position:sticky;top:60px;background:rgba(8,10,14,.97);
  backdrop-filter:blur(12px);z-index:90;}
.filter-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  color:var(--dim);margin-right:4px;}
.brand-chip{padding:6px 14px;background:var(--surface);border:1px solid var(--line);
  border-radius:20px;font-size:12px;font-weight:500;color:var(--muted);
  cursor:pointer;transition:all .15s;white-space:nowrap;}
.brand-chip:hover{border-color:var(--blue);color:var(--white);}
.brand-chip.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.sort-wrap{margin-left:auto;display:flex;align-items:center;gap:8px;}
.sort-label{font-size:12px;color:var(--dim);}
.sort-sel{background:var(--surface);border:1px solid var(--line);border-radius:8px;
  color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;
  padding:6px 10px;outline:none;cursor:pointer;}
.sort-sel:focus{border-color:var(--blue);}
.result-info{font-size:12px;color:var(--dim);font-family:'JetBrains Mono',monospace;}

/* ── PRODUCT GRID ── */
.main{padding:32px 40px 60px;}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px;}

/* ── PRODUCT CARD ── */
.product-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;
  overflow:hidden;position:relative;transition:border-color .2s,transform .2s;cursor:pointer;}
.product-card:hover{border-color:var(--blue);transform:translateY(-3px);}
.product-badge{position:absolute;top:10px;left:10px;z-index:2;padding:3px 8px;
  border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.5px;}
.badge-hot{background:var(--danger);color:#fff;}
.badge-new{background:var(--green);color:#fff;}
.badge-sale{background:var(--gold);color:#000;}
.wish-btn{position:absolute;top:8px;right:8px;z-index:2;width:28px;height:28px;
  background:rgba(8,10,14,.7);border-radius:7px;display:flex;align-items:center;
  justify-content:center;font-size:14px;cursor:pointer;color:var(--muted);transition:color .2s;}
.wish-btn:hover{color:var(--danger);}
.wish-btn.wished{color:var(--danger);}
.carousel{height:180px;overflow:hidden;position:relative;background:var(--card);}
.carousel-track{display:flex;height:100%;transition:transform .3s ease;}
.carousel-slide{flex-shrink:0;width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;font-size:60px;}
.carousel-slide img{width:100%;height:100%;object-fit:cover;}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);
  width:26px;height:26px;background:rgba(8,10,14,.8);border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  cursor:pointer;color:var(--muted);z-index:2;opacity:0;transition:opacity .2s;}
.carousel:hover .carousel-btn{opacity:1;}
.carousel-btn.prev{left:6px;}
.carousel-btn.next{right:6px;}
.carousel-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
  display:flex;gap:4px;}
.carousel-dot{width:5px;height:5px;background:rgba(255,255,255,.3);border-radius:50%;
  cursor:pointer;transition:background .15s;}
.carousel-dot.active{background:var(--blue);}
.img-count-badge{position:absolute;top:8px;right:8px;background:rgba(8,10,14,.7);
  border-radius:5px;font-size:9px;font-family:'JetBrains Mono',monospace;
  color:var(--muted);padding:2px 5px;}
.product-body{padding:14px;}
.product-brand{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  color:var(--blue-light);font-family:'JetBrains Mono',monospace;margin-bottom:4px;}
.product-name{font-size:13px;font-weight:600;color:var(--white);line-height:1.4;
  margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.stars{display:flex;align-items:center;gap:2px;margin-bottom:6px;}
.star{color:var(--gold);font-size:11px;}
.star-e{color:var(--dim);font-size:11px;}
.rcount{font-size:10px;color:var(--dim);margin-left:4px;font-family:'JetBrains Mono',monospace;}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.stock-badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;}
.stock-in{background:rgba(63,185,80,.1);color:var(--green);border:1px solid rgba(63,185,80,.2);}
.stock-out{background:rgba(255,77,106,.1);color:var(--danger);border:1px solid rgba(255,77,106,.2);}
.origin-tag{font-size:9px;color:var(--muted);background:var(--card);
  border:1px solid var(--line);padding:2px 6px;border-radius:4px;}
.product-spec{font-size:11px;color:var(--dim);line-height:1.5;margin-bottom:10px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.product-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.product-price{font-size:15px;font-weight:700;color:var(--white);font-family:'JetBrains Mono',monospace;}
.product-price .old{font-size:11px;color:var(--dim);text-decoration:line-through;display:block;font-weight:400;}
.add-cart-btn{width:30px;height:30px;background:var(--blue);border:none;border-radius:8px;
  color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;}
.add-cart-btn:hover{background:#1568d3;}

/* ── SKELETON ── */
.skeleton{background:linear-gradient(90deg,var(--surface) 25%,var(--card) 50%,var(--surface) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:14px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{height:320px;}

/* ── EMPTY / ERROR ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 20px;text-align:center;gap:12px;}
.empty-icon{font-size:56px;}
.empty-title{font-size:22px;font-weight:600;color:var(--muted);}
.empty-sub{font-size:14px;color:var(--dim);max-width:320px;line-height:1.6;}
.empty-btn{margin-top:8px;padding:10px 24px;background:var(--blue);color:#fff;
  border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;
  font-weight:600;cursor:pointer;text-decoration:none;}

/* ── PRODUCT DETAIL MODAL ── */
.pd-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  backdrop-filter:blur(8px);z-index:300;align-items:center;justify-content:center;padding:20px;}
.pd-overlay.open{display:flex;}
.pd-modal{background:var(--dark);border:1px solid var(--line);border-radius:20px;
  max-width:900px;width:100%;max-height:90vh;overflow-y:auto;
  display:grid;grid-template-columns:1fr 1fr;}
.pd-close{position:absolute;top:16px;right:16px;width:32px;height:32px;
  background:var(--surface);border:1px solid var(--line);border-radius:8px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--muted);z-index:2;}
.pd-close:hover{border-color:var(--danger);color:var(--danger);}
.pd-wrap{position:relative;}
.pd-gallery{height:380px;overflow:hidden;border-radius:20px 0 0 20px;background:var(--surface);}
.pd-gallery .carousel-track{height:100%;}
.pd-gallery .carousel-slide{font-size:100px;}
.pd-gallery .carousel-slide img{object-fit:contain;padding:16px;}
.pd-gallery .carousel-btn{opacity:1;}
.pd-gallery .carousel-dots{bottom:14px;}
.pd-gallery .carousel-dot{width:7px;height:7px;}
.pd-info{padding:28px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;}
.pd-badge-row{display:flex;gap:8px;flex-wrap:wrap;}
.pd-name{font-size:28px;font-weight:700;line-height:1.3;}
.pd-brand{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  color:var(--blue-light);font-family:'JetBrains Mono',monospace;}
.pd-price{font-size:34px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--white);}
.pd-old-price{font-size:14px;color:var(--dim);text-decoration:line-through;}
.pd-spec{font-size:13px;color:var(--muted);line-height:1.7;white-space:pre-line;}
.pd-meta-row{display:flex;gap:8px;flex-wrap:wrap;}
.pd-actions{display:flex;gap:10px;flex-wrap:wrap;}
.pd-cart-btn{flex:1;padding:13px;background:var(--blue);color:#fff;border:none;
  border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.pd-cart-btn:hover{background:#1568d3;}
.pd-wa-btn{padding:13px 18px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.3);
  color:#25D366;border-radius:10px;font-size:13px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;text-decoration:none;
  display:flex;align-items:center;gap:6px;}
.pd-wa-btn:hover{background:rgba(37,211,102,.2);}
@media(max-width:768px){
  .pd-modal{grid-template-columns:1fr;max-height:96vh;}
  .pd-gallery{border-radius:20px 20px 0 0;height:260px;}
  .pd-info{padding:18px;}
  .pd-name{font-size:22px;}
  .pd-price{font-size:26px;}
}

/* ── MOBILE ── */
@media(max-width:768px){
  nav{padding:0 14px;height:52px;gap:10px;}
  .nav-search{display:none;}
  .page-header{padding:20px 14px 0;}
  .page-title{font-size:30px;}
  .filter-bar{padding:12px 14px;top:52px;gap:6px;}
  .sort-wrap{display:none;}
  .main{padding:20px 12px 80px;}
  .product-grid{grid-template-columns:1fr 1fr;gap:10px;}
  .carousel{height:150px;}
}
@media(max-width:480px){
  .product-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="logo">Tech<span>Vault</span></a>
  <div class="nav-sep"></div>
  <span class="nav-title" id="nav-cat-title">Category</span>
  <div class="nav-spacer"></div>
  <div class="nav-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#484F58" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="cat-search" placeholder="Search in this category…" oninput="filterProducts()">
  </div>
  <a href="index.html" class="home-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </a>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="breadcrumb">
    <a href="index.html">TechVault</a>
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    <span id="breadcrumb-cat">Category</span>
  </div>
  <div class="page-title-row">
    <div class="page-title" id="page-title">Products</div>
    <div class="page-count" id="page-count">0 items</div>
  </div>
  <div class="page-sub" id="page-sub"></div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <span class="filter-label">Brand:</span>
  <div id="brand-filters"></div>
  <div class="sort-wrap">
    <span class="sort-label">Sort by:</span>
    <select class="sort-sel" id="sort-sel" onchange="filterProducts()">
      <option value="default">Featured</option>
      <option value="price-asc">Price: Low → High</option>
      <option value="price-desc">Price: High → Low</option>
      <option value="name">Name A–Z</option>
      <option value="rating">Top Rated</option>
    </select>
    <span class="result-info" id="result-info"></span>
  </div>
</div>

<!-- PRODUCT GRID -->
<div class="main">
  <div class="product-grid" id="product-grid">
    <!-- Skeletons while loading -->
    <div class="skeleton skel-card"></div>
    <div class="skeleton skel-card"></div>
    <div class="skeleton skel-card"></div>
    <div class="skeleton skel-card"></div>
    <div class="skeleton skel-card"></div>
    <div class="skeleton skel-card"></div>
  </div>
</div>

<!-- PRODUCT DETAIL MODAL -->
<div class="pd-overlay" id="pd-overlay" onclick="closePD(event)">
  <div class="pd-modal pd-wrap" onclick="event.stopPropagation()">
    <div class="pd-close" onclick="closePDModal()">✕</div>
    <div class="pd-gallery" id="pd-gallery"></div>
    <div class="pd-info" id="pd-info"></div>
  </div>
</div>

<script>
// ── FIREBASE ──
var firebaseConfig = {
  apiKey:            "AIzaSyDWidj-ZvdlQ3Ud0EWfAevWdbosmvY76nM",
  authDomain:        "techvault-1.firebaseapp.com",
  projectId:         "techvault-1",
  storageBucket:     "techvault-1.firebasestorage.app",
  messagingSenderId: "766493565374",
  appId:             "1:766493565374:web:736d7b8acb3c2fae8059ef"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

// ── CATEGORY CONFIG ──
var CAT_CONFIG = {
  laptop:  { title:'Laptops',          sub:'Powerful machines for creators & professionals', emoji:'💻' },
  phone:   { title:'Smartphones',      sub:'Latest flagships and best-value picks',           emoji:'📱' },
  audio:   { title:'Audio & Headphones', sub:'ANC headphones, earbuds, speakers and hi-fi audio gear', emoji:'🎧' },
  wearable:{ title:'Wearables',        sub:'Smartwatches, fitness trackers and AR glasses',   emoji:'⌚' },
  monitor: { title:'Monitors & Displays', sub:'4K, OLED and ultra-wide monitors',             emoji:'🖥️' },
  gaming:  { title:'Gaming',           sub:'Consoles, controllers and gaming accessories',    emoji:'🎮' },
  tv:      { title:'Televisions',      sub:'Smart TVs, OLED, QLED and 4K displays',          emoji:'📺' },
  power:   { title:'Power & Charging', sub:'Power banks, GaN chargers, wireless charging and hubs', emoji:'🔋' }
};

var allProducts = [];
var activeFilter = 'all';

// ── INIT ──
var params = new URLSearchParams(window.location.search);
var CAT    = params.get('cat') || 'phone';
var cfg    = CAT_CONFIG[CAT] || { title:'Products', sub:'', emoji:'📦' };

// Set page meta
document.title = 'TechVault — ' + cfg.title;
document.getElementById('nav-cat-title').textContent = cfg.title;
document.getElementById('breadcrumb-cat').textContent = cfg.title;
document.getElementById('page-title').textContent     = cfg.title;
document.getElementById('page-sub').textContent       = cfg.sub;

// ── LOAD FROM FIRESTORE ──
db.collection('products').where('category', '==', CAT).get().then(function(snap) {
  allProducts = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
  buildBrandFilters();
  renderProducts(allProducts);
}).catch(function(err) {
  document.getElementById('product-grid').innerHTML =
    '<div class="empty-state" style="grid-column:1/-1">' +
    '<div class="empty-icon">⚠️</div>' +
    '<div class="empty-title">Failed to load</div>' +
    '<div class="empty-sub">' + err.message + '</div>' +
    '<a href="index.html" class="empty-btn">Back to Home</a></div>';
});

// ── BRAND FILTERS ──
function buildBrandFilters() {
  var brands = [];
  allProducts.forEach(function(p) { if (p.brand && !brands.includes(p.brand)) brands.push(p.brand); });
  brands.sort();
  var bf = document.getElementById('brand-filters');
  if (brands.length < 2) { bf.innerHTML = ''; return; }
  bf.innerHTML =
    '<div class="brand-chip active" onclick="setBrand(\'all\',this)">All</div>' +
    brands.map(function(b) {
      return '<div class="brand-chip" onclick="setBrand(\'' + b.replace(/'/g,"&#39;") + '\',this)">' + b + '</div>';
    }).join('');
}

function setBrand(brand, el) {
  activeFilter = brand;
  document.querySelectorAll('#brand-filters .brand-chip').forEach(function(c) { c.classList.remove('active'); });
  el.classList.add('active');
  filterProducts();
}

// ── FILTER + SORT ──
function filterProducts() {
  var q    = (document.getElementById('cat-search').value || '').trim().toLowerCase();
  var sort = document.getElementById('sort-sel').value;
  var list = allProducts.slice();

  // Brand filter
  if (activeFilter !== 'all') {
    list = list.filter(function(p) { return p.brand === activeFilter; });
  }
  // Search filter
  if (q) {
    list = list.filter(function(p) {
      return (p.name||'').toLowerCase().includes(q) ||
             (p.brand||'').toLowerCase().includes(q) ||
             (p.spec||'').toLowerCase().includes(q);
    });
  }
  // Sort
  if (sort === 'price-asc')  list.sort(function(a,b){ return (a.price||0) - (b.price||0); });
  if (sort === 'price-desc') list.sort(function(a,b){ return (b.price||0) - (a.price||0); });
  if (sort === 'name')       list.sort(function(a,b){ return (a.name||'').localeCompare(b.name||''); });
  if (sort === 'rating')     list.sort(function(a,b){ return (b.rating||0) - (a.rating||0); });

  document.getElementById('result-info').textContent = list.length + ' product' + (list.length!==1?'s':'');
  renderProducts(list);
}

// ── RENDER ──
function renderProducts(list) {
  var grid = document.getElementById('product-grid');
  document.getElementById('page-count').textContent = allProducts.length + ' items';

  if (!list.length) {
    grid.innerHTML =
      '<div class="empty-state" style="grid-column:1/-1">' +
      '<div class="empty-icon">' + cfg.emoji + '</div>' +
      '<div class="empty-title">No products found</div>' +
      '<div class="empty-sub">Try adjusting your filters or search term.</div></div>';
    return;
  }
  grid.innerHTML = list.map(buildCard).join('');
}

function fmt(n) { return Number(n).toLocaleString(); }

function buildStars(r) {
  r = Math.min(5, Math.max(0, r || 4.5));
  return [1,2,3,4,5].map(function(i) {
    return '<span class="' + (i <= Math.round(r) ? 'star' : 'star-e') + '">&#9733;</span>';
  }).join('');
}

function buildCard(p) {
  var images = (p.images && p.images.length) ? p.images : (p.image ? [{url:p.image}] : []);
  var badge  = (p.badge && p.badge !== 'none')
    ? '<span class="product-badge badge-' + p.badge + '">' + p.badge.toUpperCase() + '</span>' : '';
  var price  = p.oldPrice
    ? '<span class="old">KSh ' + fmt(p.oldPrice) + '</span>KSh ' + fmt(p.price)
    : 'KSh ' + fmt(p.price);
  var rcount = p.reviews > 999 ? '(' + (p.reviews/1000).toFixed(1) + 'K)' : '(' + (p.reviews || 0) + ')';
  var cid    = 'c-' + (p.id || Math.random().toString(36).slice(2));
  var pid    = p.id || '';
  var safeN  = (p.name || '').replace(/[<>&'"]/g, '');

  var slides = images.length
    ? images.map(function(img){ return '<div class="carousel-slide"><img src="' + img.url + '" alt="" loading="lazy"></div>'; }).join('')
    : '<div class="carousel-slide">' + (cfg.emoji || '📦') + '</div>';

  var controls = '';
  if (images.length > 1) {
    var dots = images.map(function(_, i) {
      return '<div class="carousel-dot' + (i===0?' active':'') + '" onclick="goSlide(\'' + cid + '\',' + i + ',event)"></div>';
    }).join('');
    controls =
      '<div class="carousel-btn prev" onclick="prevSlide(\'' + cid + '\',event);event.stopPropagation()">&#8249;</div>' +
      '<div class="carousel-btn next" onclick="nextSlide(\'' + cid + '\',event);event.stopPropagation()">&#8250;</div>' +
      '<div class="img-count-badge">' + images.length + ' imgs</div>' +
      '<div class="carousel-dots">' + dots + '</div>';
  }

  var originIcons = { 'UAE/DUBAI':'🇦🇪', 'EAST AFRICA':'🌍', 'EX UK':'🇬🇧' };
  var originHtml  = (p.origin && originIcons[p.origin])
    ? '<span class="origin-tag">' + originIcons[p.origin] + ' ' + p.origin + '</span>' : '';
  var stockHtml   = p.stock === 'SOLD OUT'
    ? '<span class="stock-badge stock-out">✕ Sold Out</span>'
    : '<span class="stock-badge stock-in">✓ In Stock</span>';

  return '<div class="product-card" id="' + cid + '" data-slides="' + images.length + '" data-current="0" data-pid="' + pid + '" onclick="openPD(this)">' +
    badge +
    '<div class="wish-btn" onclick="toggleWish(this);event.stopPropagation()">&#9825;</div>' +
    '<div class="carousel" onmousedown="startDrag(event,\'' + cid + '\')" ontouchstart="startDrag(event,\'' + cid + '\')">' +
      '<div class="carousel-track" id="track-' + cid + '">' + slides + '</div>' +
      controls +
    '</div>' +
    '<div class="product-body">' +
      '<div class="product-brand">' + (p.brand || '') + '</div>' +
      '<div class="product-name">' + (p.name || '') + '</div>' +
      '<div class="stars">' + buildStars(p.rating) + '<span class="rcount">' + rcount + '</span></div>' +
      '<div class="card-meta">' + stockHtml + originHtml + '</div>' +
      '<div class="product-spec">' + (p.spec || '') + '</div>' +
      '<div class="product-footer">' +
        '<div class="product-price">' + price + '</div>' +
        '<button class="add-cart-btn" onclick="event.stopPropagation()">+</button>' +
      '</div>' +
    '</div></div>';
}

// ── CAROUSEL ──
function goSlide(cid, idx, e) {
  if (e) e.stopPropagation();
  var card = document.getElementById(cid);
  if (!card) return;
  var n = parseInt(card.dataset.slides) || 1;
  idx = Math.max(0, Math.min(n - 1, idx));
  card.dataset.current = idx;
  var track = document.getElementById('track-' + cid);
  if (track) track.style.transform = 'translateX(-' + (idx * 100) + '%)';
  card.querySelectorAll('.carousel-dot').forEach(function(d, i) { d.classList.toggle('active', i === idx); });
}
function prevSlide(cid, e) {
  if (e) e.stopPropagation();
  var card = document.getElementById(cid);
  if (!card) return;
  var n   = parseInt(card.dataset.slides) || 1;
  var cur = parseInt(card.dataset.current) || 0;
  goSlide(cid, cur <= 0 ? n - 1 : cur - 1, e);
}
function nextSlide(cid, e) {
  if (e) e.stopPropagation();
  var card = document.getElementById(cid);
  if (!card) return;
  var n   = parseInt(card.dataset.slides) || 1;
  var cur = parseInt(card.dataset.current) || 0;
  goSlide(cid, cur >= n - 1 ? 0 : cur + 1, e);
}
var dragState = {};
function startDrag(e, cid) {
  var startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
  dragState = { cid: cid, startX: startX, moved: false };
  var up = function(ev) {
    var endX  = ev.type === 'touchend' ? (ev.changedTouches[0]||{}).clientX : ev.clientX;
    var delta = endX - dragState.startX;
    if (Math.abs(delta) > 40) {
      if (delta < 0) nextSlide(dragState.cid, ev);
      else prevSlide(dragState.cid, ev);
    }
    document.removeEventListener('mouseup', up);
    document.removeEventListener('touchend', up);
  };
  document.addEventListener('mouseup', up);
  document.addEventListener('touchend', up);
}

// ── PRODUCT DETAIL ──
function openPD(el) {
  var pid    = el.dataset.pid;
  var p      = allProducts.find(function(x){ return x.id === pid; });
  if (!p) return;
  var images = (p.images && p.images.length) ? p.images : (p.image ? [{url:p.image}] : []);
  var slides = images.length
    ? images.map(function(img){ return '<div class="carousel-slide"><img src="' + img.url + '" alt=""></div>'; }).join('')
    : '<div class="carousel-slide" style="font-size:100px">' + (cfg.emoji||'📦') + '</div>';
  var dots = images.length > 1
    ? '<div class="carousel-dots">' + images.map(function(_,i){
        return '<div class="carousel-dot' + (i===0?' active':'') + '" onclick="goSlide(\'pd-car\',' + i + ',event)"></div>';
      }).join('') + '</div>' : '';

  document.getElementById('pd-gallery').innerHTML =

  var badge = (p.badge && p.badge !== 'none')

  var waMsg = encodeURIComponent('Hi! I\'m interested in ' + (p.name||'') + ' (KSh ' + fmt(p.price||0) + ')');
  var originIcons = { 'UAE/DUBAI':'🇦🇪', 'EAST AFRICA':'🌍', 'EX UK':'🇬🇧' };
  var originHtml  = (p.origin && originIcons[p.origin])

    : '<span class="stock-badge stock-in">✓ In Stock</span>';

  document.getElementById('pd-info').innerHTML =

    '<div class="pd-brand">' + (p.brand||'') + '</div>' +
    '<div class="pd-name">' + (p.name||'') + '</div>' +
    '<div class="stars">' + buildStars(p.rating) + '<span class="rcount">(' + (p.reviews||0) + ' reviews)</span></div>' +
    (p.oldPrice ? '<div class="pd-old-price">KSh ' + fmt(p.oldPrice) + '</div>' : '') +
    '<div class="pd-price">KSh ' + fmt(p.price||0) + '</div>' +
    '<div class="pd-meta-row">' + stockHtml + originHtml + '</div>' +
    '<div class="pd-spec">' + (p.spec||'No description available.') + '</div>' +
    '<div class="pd-actions">' +
      '<button class="pd-cart-btn">🛒 Add to Cart</button>' +
      '<a class="pd-wa-btn" href="https://wa.me/254795114610?text=' + waMsg + '" target="_blank">' +

        'WhatsApp' +
      '</a>' +
    '</div>';

  document.getElementById('pd-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closePD(e) {
  if (e && e.target !== document.getElementById('pd-overlay')) return;
  closePDModal();
}
function closePDModal() {
  document.getElementById('pd-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function toggleWish(el) { el.classList.toggle('wished'); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePDModal();
});
</script>
